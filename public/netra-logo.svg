<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Icon: Rounded square with geometric N -->
  <g>
    <!-- Base rounded rectangle -->
    <rect x="0" y="0" width="76" height="76" rx="16" fill="#5B6CF6"/>
    <!-- N letterform via white cutouts -->
    <!-- Left vertical stroke -->
    <rect x="14" y="14" width="14" height="48" fill="white"/>
    <!-- Diagonal stroke -->
    <polygon points="14,14 28,14 62,52 62,62 48,62 14,24" fill="white"/>
    <!-- Right vertical stroke -->
    <rect x="48" y="14" width="14" height="48" fill="white"/>
    <!-- Small notch/cutout at bottom-left for the distinctive style -->
    <polygon points="14,48 14,62 28,62" fill="#5B6CF6"/>
    <!-- Circle cutout on upper right of N for the eye/distinctive mark -->
    <circle cx="55" cy="28" r="7" fill="#5B6CF6"/>
  </g>
  <!-- Wordmark: "etra" -->
  <text x="88" y="60" font-family="'DM Sans', 'Inter', Arial, sans-serif" font-size="54" font-weight="700" fill="#5B6CF6" letter-spacing="-1">etra</text>
</svg>
