<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Icon: Rounded square with geometric N (white version for dark backgrounds) -->
  <g>
    <rect x="0" y="0" width="76" height="76" rx="16" fill="rgba(255,255,255,0.2)"/>
    <!-- N letterform -->
    <rect x="14" y="14" width="14" height="48" fill="white"/>
    <polygon points="14,14 28,14 62,52 62,62 48,62 14,24" fill="white"/>
    <rect x="48" y="14" width="14" height="48" fill="white"/>
    <polygon points="14,48 14,62 28,62" fill="rgba(255,255,255,0.2)"/>
    <circle cx="55" cy="28" r="7" fill="rgba(255,255,255,0.2)"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="60" font-family="'DM Sans', 'Inter', Arial, sans-serif" font-size="54" font-weight="700" fill="white" letter-spacing="-1">etra</text>
</svg>
